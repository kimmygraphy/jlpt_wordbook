<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N4 단어장 — 해커스 JLPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">JLPT N4</div>
    <div class="dday" id="dday-counter">계산중...</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">0 / 0</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('list', this)">📋 목록</button>
  <button class="tab-btn" onclick="switchTab('flash', this)">🃏 플래시카드</button>
</div>

<!-- ===================== 목록 탭 ===================== -->
<div id="tab-list" class="tab-panel active">
  <div class="filters">
    <input class="search-input" type="text" placeholder="단어 / 후리가나 / 뜻 검색..." id="search-input" oninput="applyListFilters()">
    <div class="filter-row scroll">
      <span class="filter-label">일자</span>
      <div id="list-day-row" style="display:contents"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">품사</span>
      <div id="list-pos-row" style="display:contents"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">상태</span>
      <div id="list-status-row" style="display:contents"></div>
    </div>
  </div>
  <div class="list-content" id="list-content"></div>
</div>

<!-- ===================== 플래시카드 탭 ===================== -->
<div id="tab-flash" class="tab-panel">
  <div class="flash-content">
    <div class="flash-controls">
      <button class="chip furigana-btn" id="furigana-toggle" onclick="toggleFurigana()">あ 후리가나</button>
      <button class="chip" onclick="shuffleFlash()">🔀 셔플</button>
      <span class="flash-stat" id="flash-stat">0 / 0</span>
    </div>

    <div class="filters" style="position:static; width:100%;">
      <div class="filter-row scroll">
        <span class="filter-label">일자</span>
        <div id="flash-day-row" style="display:contents"></div>
      </div>
      <div class="filter-row">
        <span class="filter-label">품사</span>
        <div id="flash-pos-row" style="display:contents"></div>
      </div>
      <div class="filter-row">
        <span class="filter-label">상태</span>
        <div id="flash-status-row" style="display:contents"></div>
      </div>
    </div>

    <div class="flash-card-wrap">
      <div class="flash-card" id="flash-card" onclick="flipCard()">
        <div class="flash-face flash-front">
          <span class="flash-pin-indicator" id="f-pin-indicator">📍</span>
          <div class="flash-top-row" id="f-day-tags"></div>
          <div class="flash-word" id="f-word">—</div>
          <div class="flash-pos" id="f-pos"></div>
          <div class="flash-hint">탭하여 뒤집기 👆</div>
        </div>
        <div class="flash-face flash-back">
          <div class="flash-reading" id="f-reading">—</div>
          <div class="flash-meaning" id="f-meaning">—</div>
          <div class="flash-related" id="f-related"></div>
        </div>
      </div>
    </div>

    <div class="flash-counter" id="flash-counter">0 / 0</div>

    <div class="flash-nav">
      <button class="nav-btn" onclick="prevCard()">← 이전</button>
      <button class="nav-btn memorize-btn" id="memorize-btn" onclick="cycleFlashMemorize()">☆ 체크하기</button>
      <button class="nav-btn" onclick="nextCard()">다음 →</button>
    </div>
    <div class="flash-nav">
      <button class="nav-btn pin-toggle-btn" id="pin-toggle-btn" onclick="togglePinFlash()">📍 잘 안외워짐</button>
    </div>
    <div style="height:20px"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
